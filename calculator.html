<!DOCTYPE html>
<html>
<head>
  <title>Scientific Calculator</title>
  <style>
    body {
      background: #0a1a33;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #102a54;
      padding: 20px;
      border-radius: 20px;
      width: 300px;
    }

    /* DISPLAY (FIXED + CURSOR) */
    #display {
      width: 100%;
      height: 60px;
      font-size: 22px;
      text-align: right;
      padding: 10px;
      margin-bottom: 15px;

      background: #021024;
      color: #ffffff;

      border: 2px solid #2d6cdf;
      border-radius: 10px;

      box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
      position: relative;
    }

    /* blinking cursor */
    #display::after {
      content: "|";
      position: absolute;
      right: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 14px;
      background: #1e4fa3;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #2d6cdf;
    }
  </style>
</head>
<body>

<div class="calculator">
  <input id="display" placeholder="0" disabled>

  <div class="buttons">
    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('sin(')">sin</button>
    <button onclick="append('cos(')">cos</button>
    <button onclick="append('tan(')">tan</button>
    <button onclick="append('sqrt(')">√</button>

    <button onclick="append('log(')">log</button>
    <button onclick="append('ln(')">ln</button>
    <button onclick="append('^')">^</button>
    <button onclick="append('%')">%</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('/')">÷</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('-')">−</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="append('pi')">π</button>
    <button onclick="append('+')">+</button>

    <button onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearAll() {
  display.value = "";
}

function del() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    display.value = evaluate(display.value);
  } catch {
    display.value = "Error";
  }
}

// --- PARSER ---

function evaluate(expr) {
  expr = expr.replace(/pi/g, Math.PI);

  let tokens = tokenize(expr);
  let rpn = toRPN(tokens);
  return evalRPN(rpn);
}

function tokenize(expr) {
  return expr.match(/sin|cos|tan|sqrt|log|ln|\d+\.?\d*|[+\-*/^()%]/g);
}

function toRPN(tokens) {
  let output = [];
  let ops = [];
  let prec = {"+":1,"-":1,"*":2,"/":2,"^":3};

  tokens.forEach(token => {
    if (!isNaN(token)) {
      output.push(token);
    }
    else if (["sin","cos","tan","sqrt","log","ln"].includes(token)) {
      ops.push(token);
    }
    else if (token === "(") {
      ops.push(token);
    }
    else if (token === ")") {
      while (ops.length && ops[ops.length-1] !== "(") {
        output.push(ops.pop());
      }
      ops.pop();
    }
    else {
      while (ops.length && prec[ops[ops.length-1]] >= prec[token]) {
        output.push(ops.pop());
      }
      ops.push(token);
    }
  });

  return output.concat(ops.reverse());
}

function evalRPN(rpn) {
  let stack = [];

  rpn.forEach(token => {
    if (!isNaN(token)) {
      stack.push(parseFloat(token));
    }
    else if (["+", "-", "*", "/", "^"].includes(token)) {
      let b = stack.pop();
      let a = stack.pop();
      switch(token) {
        case "+": stack.push(a+b); break;
        case "-": stack.push(a-b); break;
        case "*": stack.push(a*b); break;
        case "/": stack.push(a/b); break;
        case "^": stack.push(Math.pow(a,b)); break;
      }
    }
    else {
      let a = stack.pop();
      switch(token) {
        case "sin": stack.push(Math.sin(a*Math.PI/180)); break;
        case "cos": stack.push(Math.cos(a*Math.PI/180)); break;
        case "tan": stack.push(Math.tan(a*Math.PI/180)); break;
        case "sqrt": stack.push(Math.sqrt(a)); break;
        case "log": stack.push(Math.log10(a)); break;
        case "ln": stack.push(Math.log(a)); break;
      }
    }
  });

  return stack[0];
}
</script>

</body>
</html>
