<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brendan's Cool Clicker Game</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  margin:0;
}

button {
  background:#007BFF;
  color:white;
  border:none;
  padding:8px;
  margin:4px;
  border-radius:8px;
  cursor:pointer;
}
button:hover { background:#0056b3; }

.box { margin-top:20px; }

#message { color:red; height:20px; }

/* ===== WIDGET MODE ===== */
.widget-mode #appContainer {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 260px;
  height: 420px;
  overflow-y: auto;
  border: 2px solid #007BFF;
  border-radius: 10px;
  background: black;
}
</style>
</head>

<body>

<div id="appContainer">

<h1>Brendan's Cool Clicker Game</h1>

<button onclick="showGame()">Game</button>
<button onclick="showSettings()">Settings</button>

<p>Score: <span id="score">0</span></p>
<p id="message"></p>

<button onclick="clickScore()">Click</button>

<div id="gamePage">

<div class="box">
<h2>Per Click Upgrades</h2>
<div id="clickUpgrades"></div>
</div>

<div class="box">
<h2>Auto Clickers</h2>
<div id="autoUpgrades"></div>
</div>

<div class="box">
<h2>Achievements</h2>
<ul id="achievementsList"></ul>
</div>

</div>

<div id="settingsPage" style="display:none;">
<h2>Settings</h2>

<button onclick="installApp()">Install Widget Version</button><br>
<button onclick="resetGame()">Reset Game</button><br>
<button onclick="downloadSave()">Download Save</button><br>
<input type="file" onchange="uploadSave(event)">

</div>

</div>

<script>
// ===== INSTALL SYSTEM =====
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
});

function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; });
  } else {
    alert("Install not available");
  }
}

// ===== DETECT WIDGET MODE =====
if(window.matchMedia('(display-mode: standalone)').matches){
  document.body.classList.add("widget-mode");
}

// ===== GAME VARIABLES =====
let score=0, perClick=1, perSecond=0, totalClicks=0, achievements=[];

// ===== FORMAT =====
const units=["","K","M","B","T","QUAD","QUIN","SEX","SEP","OCT","NON","DEC","UNDEC","VIG","UNVIG"];
function formatNumber(num){
  let i=0;
  while(num>=1000 && i<units.length-1){ num/=1000; i++; }
  return num.toFixed(1)+units[i];
}

// ===== MESSAGE =====
function showMessage(text){
  let m=document.getElementById("message");
  m.innerText=text;
  setTimeout(()=>m.innerText="",2000);
}

// ===== UPGRADES =====
const upgradeValues=[1.5,2,2.5,3,4,6,10,20,40,50,100,200,500,1e3,1e4,1e6,1e9,1e12,1e15,1e18,1e21];

let clickUpgrades=[], autoUpgrades=[];
upgradeValues.forEach(v=>{
  clickUpgrades.push({value:v,cost:v*10});
  autoUpgrades.push({value:v,cost:v*20});
});

// ===== RENDER =====
function renderUpgrades(){
  let c=document.getElementById("clickUpgrades");
  let a=document.getElementById("autoUpgrades");
  c.innerHTML=""; a.innerHTML="";

  clickUpgrades.forEach((u,i)=>{
    let b=document.createElement("button");
    b.innerText=`+${formatNumber(u.value)} (${formatNumber(u.cost)})`;
    b.onclick=()=>buyClick(i);
    b.disabled = score < u.cost;
    c.appendChild(b);
  });

  autoUpgrades.forEach((u,i)=>{
    let b=document.createElement("button");
    b.innerText=`+${formatNumber(u.value)}/s (${formatNumber(u.cost)})`;
    b.onclick=()=>buyAuto(i);
    b.disabled = score < u.cost;
    a.appendChild(b);
  });
}

// ===== BUY =====
function buyClick(i){
  let u=clickUpgrades[i];
  if(score>=u.cost){
    score-=u.cost;
    perClick+=u.value;
    u.cost*=1.5;
  } else {
    showMessage("❌ Not enough clicks! Need: "+formatNumber(u.cost));
  }
}

function buyAuto(i){
  let u=autoUpgrades[i];
  if(score>=u.cost){
    score-=u.cost;
    perSecond+=u.value;
    u.cost*=1.5;
  } else {
    showMessage("❌ Not enough clicks! Need: "+formatNumber(u.cost));
  }
}

// ===== CLICK =====
let lastClick=0;
function clickScore(){
  score+=perClick;
  totalClicks++;

  let now=Date.now();
  if(now-lastClick<9 && !achievements.includes("fast")){
    achievements.push("fast");
    alert("Fast Clicker!");
  }
  lastClick=now;

  checkAchievements();
}

// ===== ACHIEVEMENTS =====
const milestones=[100,200,400,800,1000,5000,10000,100000,1e6,1e9,1e12];
function checkAchievements(){
  milestones.forEach(m=>{
    if(totalClicks>=m && !achievements.includes(m)){
      achievements.push(m);
      alert(formatNumber(m)+" clicks!");
    }
  });
}

// ===== UPDATE =====
function update(){
  document.getElementById("score").innerText=formatNumber(score);

  let list=document.getElementById("achievementsList");
  list.innerHTML="";
  achievements.forEach(a=>{
    let li=document.createElement("li");
    li.innerText=(a==="fast")?"Fast Clicker ⚡":formatNumber(a)+" clicks";
    list.appendChild(li);
  });

  renderUpgrades();
}

setInterval(()=>{ score+=perSecond; update(); },1000);

// ===== SAVE =====
function save(){
  localStorage.setItem("game",JSON.stringify({score,perClick,perSecond,totalClicks,achievements}));
}
function load(){
  let d=JSON.parse(localStorage.getItem("game"));
  if(d){ Object.assign(window,d); }
  update();
}
setInterval(save,5000); load();

// ===== SETTINGS =====
function showSettings(){
  document.getElementById("gamePage").style.display="none";
  document.getElementById("settingsPage").style.display="block";
}
function showGame(){
  document.getElementById("settingsPage").style.display="none";
  document.getElementById("gamePage").style.display="block";
}

function resetGame(){
  if(confirm("Reset progress?")){
    score=0; perClick=1; perSecond=0; totalClicks=0; achievements=[];
    save(); update();
  }
}

function downloadSave(){
  const blob=new Blob([localStorage.getItem("game")],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="save.json";
  a.click();
}

function uploadSave(e){
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=x=>{
    localStorage.setItem("game",x.target.result);
    load();
  };
  reader.readAsText(file);
}

// ===== OFFLINE (INLINE SW) =====
if('serviceWorker' in navigator){
  const code=`self.addEventListener("fetch",e=>{});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([code])));
}

// ===== INLINE MANIFEST =====
const manifest={name:"Clicker",short_name:"Clicker",start_url:"./",display:"standalone"};
const link=document.createElement('link');
link.rel='manifest';
link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
document.head.appendChild(link);

</script>

</body>
</html>
