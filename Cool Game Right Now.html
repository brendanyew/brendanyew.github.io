<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brendan's Cool Clicker Game</title>
<style>
body {background:black;color:white;font-family:Arial;text-align:center;margin:0;}
button {background:#007BFF;color:white;border:none;padding:8px;margin:4px;border-radius:8px;cursor:pointer;white-space:pre-line;width:90%;font-size:12px;}
button:hover{background:#0056b3;}
#appContainer{margin:10px;}
.box{margin-top:20px;}
#message{color:red;height:20px;}
.stats{margin:10px;font-size:14px;}
.widget-mode #appContainer{position:fixed;bottom:10px;right:10px;width:260px;height:480px;overflow-y:auto;border:2px solid #007BFF;border-radius:10px;background:black;}
#progressContainer{width:90%;height:20px;background:#222;margin:auto;border-radius:10px;overflow:hidden;}
#progressBar{height:100%;width:0%;background:#007BFF;transition:width 0.2s;}
#popupContainer{position:fixed;top:10px;right:10px;}
.popup{background:#007BFF;color:white;padding:10px;margin:5px;border-radius:8px;animation:fade 2s forwards;}
@keyframes fade{0%{opacity:1;}100%{opacity:0;}}
#clickBtn:active{transform:scale(0.9);}
</style>
</head>
<body>
 <!-- LOGO ADDED HERE -->
    <a href="index.html">
        <img src="Logo.png" alt="Brendan's Website" class="logo">
    </a>
<div id="appContainer">
<h1>Brendan's Cool Clicker Game</h1>
<button onclick="showGame()">Game</button><button onclick="showSettings()">Settings</button>

<p>Score: <span id="score">0</span></p>
<div class="stats">
🖱 Per Click: <span id="perClickDisplay">1</span><br>
⚡ Per Second: <span id="perSecondDisplay">0</span><br>
Prestige Level: <span id="prestigeDisplay">0</span>
</div>

<p id="message"></p>

<button id="clickBtn" onclick="clickScore()">Click</button>

<!-- GAME PAGE -->
<div id="gamePage">
<div class="box">
<h2>Per Click Upgrades</h2>
<div id="clickUpgrades"></div>
</div>

<div class="box">
<h2>Auto Clickers</h2>
<div id="autoUpgrades"></div>
</div>

<div class="box">
<h2>Progress to Next Upgrade</h2>
<div id="progressContainer"><div id="progressBar"></div></div>
<p id="progressText"></p>
</div>

<div class="box">
<h2>Achievements</h2>
<ul id="achievementsList"></ul>
</div>

<div class="box">
<h2>Leaderboard</h2>
<ol id="leaderboard"></ol>
</div>
</div>

<!-- SETTINGS PAGE -->
<div id="settingsPage" style="display:none;">
<h2>Settings</h2>
<button onclick="installApp()">Install Widget Version</button><br>
<button onclick="resetGame()">Reset Game</button><br>
<button onclick="prestigeReset()">Prestige (Rebirth)</button><br>
<button onclick="downloadSave()">Download Save</button><br>
<input type="file" onchange="uploadSave(event)"><br><br>
<button onclick="showCredits()">Credits</button>
</div>

<!-- CREDITS PAGE -->
<div id="creditsPage" style="display:none;">
<h2>Credits</h2>
<p>Made by Brendan Yew and ChatGPT</p>
<button onclick="backFromCredits()">Back</button>
</div>

<div id="popupContainer"></div>
</div>

<script>
// INSTALL / WIDGET
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{e.preventDefault();deferredPrompt=e;});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}else alert("Install not available");}
if(window.matchMedia('(display-mode: standalone)').matches) document.body.classList.add("widget-mode");

// GAME VARIABLES
let score=0, perClick=1, perSecond=0, totalClicks=0, achievements=[], prestige=0;
let clickIndex=0, autoIndex=0;
let leaderboard = JSON.parse(localStorage.getItem("leaderboard"))||[];

// UNITS
const units=["","K","M","B","T","QUAD","QUIN","SEX","SEP","OCT","NON","DEC","UNDEC","DUODEC","TREDEC","QUATTORDEC","QUINDEC","SEXDEC","SEPTENDEC","OCTODEC","NOVEMDEC","VIG","UNVIG"];
function formatNumber(num){if(num<1000) return Math.floor(num);let i=0;while(num>=1000 && i<units.length-1){num/=1000;i++;}return num.toFixed(2)+units[i];}

// UPGRADES
const upgradeValues=[1.5,2,2.5,3,4,6,10,20,40,50,100,200,500,1e3,1e4,1e6,1e9,1e12,1e15];
let clickUpgrades=[], autoUpgrades=[];
upgradeValues.forEach(v=>{
  clickUpgrades.push({value:v,cost:v*10,desc:`Increase clicks per click by ${formatNumber(v)}`});
  autoUpgrades.push({value:v,cost:v*20,desc:`Gain ${formatNumber(v)} clicks per second`});
});

// SOUND
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

// ACHIEVEMENTS
function showPopup(text){let div=document.createElement("div");div.className="popup";div.innerText=text;document.getElementById("popupContainer").appendChild(div);setTimeout(()=>div.remove(),2000);}
const milestones=[100,200,400,800,1000,5000,10000,100000,1e6,1e9,1e12];
function checkAchievements(triggerPopup=true){
  milestones.forEach(m=>{
    if(totalClicks>=m && !achievements.includes(m)){
      achievements.push(m);
      if(triggerPopup) showPopup(formatNumber(m)+" clicks!");
    }
  });
}

// CLICK ANIMATION
function spawnClickText(xOffset=0){
  let el=document.createElement("div");el.innerText="+"+formatNumber(perClick);el.style.position="absolute";
  let rect=document.getElementById("clickBtn").getBoundingClientRect();
  el.style.left=(rect.left + xOffset) + "px";el.style.top=rect.top+"px";el.style.color="#00ffcc";el.style.opacity=1;
  document.body.appendChild(el);
  let y=0;let anim=setInterval(()=>{y+=2;el.style.top=(el.offsetTop-2)+"px";el.style.opacity-=0.05;if(el.style.opacity<=0){clearInterval(anim);el.remove();}},16);
}

// CLICK SCORE
function clickScore(){score+=perClick;totalClicks++;spawnClickText();clickSound.currentTime=0;clickSound.play();checkAchievements();updateStatsOnly();}

// UPDATE FUNCTIONS
function updateStatsOnly(){
  document.getElementById("score").innerText=formatNumber(score);
  document.getElementById("perClickDisplay").innerText=formatNumber(perClick);
  document.getElementById("perSecondDisplay").innerText=formatNumber(perSecond);
  document.getElementById("prestigeDisplay").innerText=prestige;
  updateProgress();
  updateLeaderboard();
}
function update(){updateStatsOnly();renderUpgrades();renderAchievements();}
function updateProgress(){
  let nextClick=clickUpgrades[clickIndex], nextAuto=autoUpgrades[autoIndex];
  let target=Math.min(nextClick?nextClick.cost:Infinity,nextAuto?nextAuto.cost:Infinity);
  let percent=Math.min((score/target)*100,100);
  document.getElementById("progressBar").style.width=percent+"%";
  document.getElementById("progressText").innerText=`Progress: ${percent.toFixed(1)}% (Next cost: ${formatNumber(target)})`;
}
function updateLeaderboard(){
  let list=document.getElementById("leaderboard");list.innerHTML="";
  leaderboard.forEach((s,i)=>{let li=document.createElement("li");li.innerText="#" + (i+1) + " - " + formatNumber(s);list.appendChild(li);});
}

// RENDER UPGRADES
function renderUpgrades(){
  let c=document.getElementById("clickUpgrades");let a=document.getElementById("autoUpgrades");
  c.innerHTML="";a.innerHTML="";
  for(let i=0;i<3;i++){
    if(clickIndex+i<clickUpgrades.length){
      let u=clickUpgrades[clickIndex+i];let b=document.createElement("button");
      b.innerText=`+${formatNumber(u.value)} / click | Cost: ${formatNumber(u.cost)}\n${u.desc}`;
      if(i===0){b.onclick=()=>buyClick();if(score<u.cost)b.disabled=true;}else{b.disabled=true;b.style.opacity="0.5";}
      c.appendChild(b);
    }
    if(autoIndex+i<autoUpgrades.length){
      let u=autoUpgrades[autoIndex+i];let b=document.createElement("button");
      b.innerText=`+${formatNumber(u.value)} / sec | Cost: ${formatNumber(u.cost)}\n${u.desc}`;
      if(i===0){b.onclick=()=>buyAuto();if(score<u.cost)b.disabled=true;}else{b.disabled=true;b.style.opacity="0.5";}
      a.appendChild(b);
    }
  }
}

// BUY FUNCTIONS
function buyClick(){let u=clickUpgrades[clickIndex];if(score>=u.cost){score-=u.cost;perClick+=u.value;clickIndex++;u.cost*=1.25+(clickIndex*0.02);update();}else showPopup("❌ Need: "+formatNumber(u.cost));}
function buyAuto(){let u=autoUpgrades[autoIndex];if(score>=u.cost){score-=u.cost;perSecond+=u.value;autoIndex++;u.cost*=1.25+(autoIndex*0.02);spawnClickText();clickSound.currentTime=0;clickSound.play();showPopup(`+${formatNumber(u.value)} / sec!`);update();}else showPopup("❌ Need: "+formatNumber(u.cost));}

// RENDER ACHIEVEMENTS
function renderAchievements(){let list=document.getElementById("achievementsList");list.innerHTML="";achievements.forEach(a=>{let li=document.createElement("li");li.innerText=(a==="fast")?"Fast Clicker ⚡":formatNumber(a)+" clicks";list.appendChild(li);});}

// SAVE / LOAD
function save(){localStorage.setItem("game",JSON.stringify({score,perClick,perSecond,totalClicks,achievements,clickIndex,autoIndex,prestige,leaderboard}));}
function load(){let d=JSON.parse(localStorage.getItem("game"));if(d){score=d.score;perClick=d.perClick;perSecond=d.perSecond;totalClicks=d.totalClicks;achievements=d.achievements||[];clickIndex=d.clickIndex||0;autoIndex=d.autoIndex||0;prestige=d.prestige||0;leaderboard=d.leaderboard||[];}update();}
setInterval(save,5000); load();

// SETTINGS
function showSettings(){document.getElementById("gamePage").style.display="none";document.getElementById("settingsPage").style.display="block";}
function showGame(){document.getElementById("settingsPage").style.display="none";document.getElementById("gamePage").style.display="block";}
function resetGame(){if(confirm("Reset progress?")){leaderboard.push(score);leaderboard.sort((a,b)=>b-a);leaderboard=leaderboard.slice(0,5);localStorage.setItem("leaderboard",JSON.stringify(leaderboard));score=0;perClick=1;perSecond=0;totalClicks=0;achievements=[];clickIndex=0;autoIndex=0;save();update();}}
function downloadSave(){const blob=new Blob([localStorage.getItem("game")],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="save.json";a.click();}
function uploadSave(e){const file=e.target.files[0];const reader=new FileReader();reader.onload=x=>{localStorage.setItem("game",x.target.result);load();};reader.readAsText(file);}

// CREDITS
function showCredits(){document.getElementById("settingsPage").style.display="none";document.getElementById("creditsPage").style.display="block";}
function backFromCredits(){document.getElementById("creditsPage").style.display="none";document.getElementById("settingsPage").style.display="block";}

// PRESTIGE
function prestigeReset(){if(score<1e6){showPopup("Need 1M clicks to prestige!");return;}if(confirm("Prestige and gain permanent boost?")){prestige++;score=0;perClick=1+prestige;perSecond=0;totalClicks=0;clickIndex=0;autoIndex=0;showPopup("Prestige Level "+prestige+"!");update();}}

// GAME LOOP (smooth per second)
let last=Date.now();
function gameLoop(){
  let now=Date.now();
  let delta=(now-last)/1000;last=now;
  score += perSecond*delta;
  updateStatsOnly();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
