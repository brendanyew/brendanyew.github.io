<!DOCTYPE html>
<html>
<head>
  <title>Live FX World Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      color: black;
    }

    .header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input {
      padding: 8px;
      font-size: 14px;
      width: 100px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      color: white;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #334155;
      color: white;
    }

    .up { background: rgba(34,197,94,0.2); }
    .down { background: rgba(239,68,68,0.2); }
    .flat { background: rgba(148,163,184,0.1); }

    .price {
      font-weight: bold;
    }

    .change-up { color: #22c55e; font-weight: bold; }
    .change-down { color: #ef4444; font-weight: bold; }
    .change-flat { color: #94a3b8; }
  </style>
</head>

<body>
  <div class="logo">
    <a href="index.html">
      <img src="Logo.png" alt="Brendan's Website">
    </a>
<h1>🌍 Live FX World Dashboard</h1>

<div class="header">
  <label>Base Currency:</label>
  <input id="baseInput" value="USD" maxlength="3">
  <button onclick="loadRates()">Load</button>
</div>

<table>
  <thead>
    <tr>
      <th>Currency</th>
      <th>Rate</th>
      <th>Change</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
let oldRates = null;

async function loadRates() {
  try {
    const base = document.getElementById("baseInput").value.toUpperCase();

    const res = await fetch("https://open.er-api.com/v6/latest/" + base);
    const data = await res.json();

    const rates = data.rates;
    const tbody = document.getElementById("table");

    let html = "";

    for (let currency in rates) {
      let rate = rates[currency];

      let rowClass = "flat";
      let changeClass = "change-flat";
      let changeText = "0.00%";

      if (oldRates && oldRates[currency]) {
        const diff = (rate - oldRates[currency]) / oldRates[currency];

        if (diff > 0) {
          rowClass = "up";
          changeClass = "change-up";
          changeText = "+" + (diff * 100).toFixed(4) + "%";
        } else if (diff < 0) {
          rowClass = "down";
          changeClass = "change-down";
          changeText = (diff * 100).toFixed(4) + "%";
        }
      }

      html += `
        <tr class="${rowClass}">
          <td>${currency}</td>
          <td class="price">${rate.toFixed(4)}</td>
          <td class="${changeClass}">${changeText}</td>
        </tr>
      `;
    }

    tbody.innerHTML = html;
    oldRates = rates;

  } catch (err) {
    console.error("FX load error:", err);
  }
}

// initial load
loadRates();

// refresh every 30 seconds
setInterval(loadRates, 30000);
</script>

</body>
</html>
