<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose a Color</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
    }

    #message {
      margin-top: 10px;
      font-size: 20px;
      color: gray;
    }

    #instructions {
      font-size: 18px;
      margin-bottom: 20px;
    }

    /* NORMAL STATE (locked) */
    #transfer {
      display: block;
      margin-top: 40px;
      font-size: 18px;
      color: gray;
      text-decoration: none;
      pointer-events: none;
      opacity: 0.5;
    }

    /* ACTIVE STATE (temporary unlock) */
    #transfer.active {
      color: blue;
      pointer-events: auto;
      opacity: 1;
      text-decoration: underline;
      cursor: pointer;
    }

    /* popup */
    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 10px;
      width: 320px;
    }

    #popupText {
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="logo">
    <a href="index.html">
      <img src="Logo.png" alt="Brendan's Website">
    </a>
  <h1>Choose Blue or Black</h1>

  <div id="instructions">
    If the color you press gets shown below, you have just won yourself $500K
  </div>

  <button onclick="chooseColor('blue')">Blue</button>
  <button onclick="chooseColor('black')">Black</button>

  <div id="result"></div>
  <div id="message"></div>

  <a id="transfer" href="#">Transfer money</a>

  <!-- popup -->
  <div id="popup">
    <div id="popupBox">
      <div id="popupText">Processing $500K transaction...</div>
      <button id="cancelBtn">Cancel</button>
    </div>
  </div>

  <script>
    let timer;

    function chooseColor(choice) {
      let resultDiv = document.getElementById('result');
      let messageDiv = document.getElementById('message');
      let transferLink = document.getElementById('transfer');

      transferLink.classList.remove("active");

      if (Math.random() < 0.1) {
        resultDiv.textContent = choice;
        resultDiv.style.color = choice;

        messageDiv.textContent = "WAIT... did you just win??";

        transferLink.classList.add("active");

        setTimeout(() => {
          let result = (choice === 'blue') ? 'black' : 'blue';
          resultDiv.textContent = result;
          resultDiv.style.color = result;

          transferLink.classList.remove("active");

          let messages = [
            "So close...",
            "Better luck next time",
            "That was almost it",
            "You were THIS close",
            "Oof, unlucky",
            "Try again?"
          ];

          messageDiv.textContent =
            messages[Math.floor(Math.random() * messages.length)];
        }, 50);

      } else {
        let result = (choice === 'blue') ? 'black' : 'blue';
        resultDiv.textContent = result;
        resultDiv.style.color = result;

        let messages = [
          "So close...",
          "Better luck next time",
          "That was almost it",
          "You were THIS close",
          "Oof, unlucky",
          "Try again?"
        ];

        messageDiv.textContent =
          messages[Math.floor(Math.random() * messages.length)];
      }
    }

    // popup logic
    document.getElementById("transfer").onclick = function(e) {
      e.preventDefault();

      let popup = document.getElementById("popup");
      let text = document.getElementById("popupText");
      let cancel = document.getElementById("cancelBtn");

      popup.style.display = "flex";
      text.textContent = "Processing $500K transaction...";

      timer = setTimeout(() => {
        text.textContent = "TRANSFER FAILED";
      }, 2000);

      cancel.onclick = function() {
        clearTimeout(timer);
        popup.style.display = "none";
      };
    };
  </script>

</body>
</html>
