<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose a Color</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
    }

    #message {
      margin-top: 10px;
      font-size: 20px;
      color: gray;
    }

    #instructions {
      font-size: 18px;
      margin-bottom: 20px;
    }

    /* LOCKED STATE */
    #transfer {
      display: block;
      margin-top: 40px;
      font-size: 18px;
      color: gray;
      text-decoration: none;
      pointer-events: none;
      opacity: 0.5;
    }

    /* UNLOCKED MOMENT */
    #transfer.active {
      color: blue;
      pointer-events: auto;
      opacity: 1;
      text-decoration: underline;
      cursor: pointer;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 10px;
      width: 320px;
    }

    #popupText {
      font-size: 18px;
      margin-bottom: 20px;
    }

    #codeInput {
      padding: 8px;
      width: 60%;
      margin-right: 5px;
    }

    #copyBtn {
      cursor: pointer;
      font-size: 18px;
    }

    #error {
      color: red;
      margin-top: 10px;
      display: none;
    }

    #confirmBtn {
      margin-top: 10px;
      padding: 8px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="logo">
    <a href="index.html">
      <img src="Logo.png" alt="Brendan's Website">
    </a>
  <h1>Choose Blue or Black</h1>

  <div id="instructions">
    If the color you press gets shown below, you have just won yourself $500K
  </div>

  <button onclick="chooseColor('blue')">Blue</button>
  <button onclick="chooseColor('black')">Black</button>

  <div id="result"></div>
  <div id="message"></div>

  <a id="transfer" href="#">Transfer money</a>

  <div id="popup">
    <div id="popupBox">

      <div id="popupText">Enter Transfer Code</div>

      <div>
        <input id="codeInput" placeholder="Enter code">
        <span id="copyBtn">📋</span>
      </div>

      <div id="error">Incorrect Code</div>

      <button id="confirmBtn">→</button>

      <br><br>
      <button id="cancelBtn">Cancel</button>

    </div>
  </div>

  <script>
    function generateCode() {
      let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let code = "";

      for (let i = 0; i < 3; i++) {
        let part = "";
        for (let j = 0; j < 3; j++) {
          part += chars[Math.floor(Math.random() * chars.length)];
        }
        code += part + (i < 2 ? "-" : "");
      }

      return code;
    }

    function chooseColor(choice) {
      let resultDiv = document.getElementById('result');
      let messageDiv = document.getElementById('message');
      let transferLink = document.getElementById('transfer');

      transferLink.classList.remove("active");

      if (Math.random() < 0.1) {
        resultDiv.textContent = choice;
        resultDiv.style.color = choice;

        messageDiv.textContent = "WAIT... did you just win??";

        transferLink.classList.add("active");

        setTimeout(() => {
          messageDiv.textContent = "Transfer Timed Out";
          transferLink.classList.remove("active");
        }, 50);

      } else {
        let result = (choice === 'blue') ? 'black' : 'blue';
        resultDiv.textContent = result;
        resultDiv.style.color = result;

        let messages = [
          "So close...",
          "Better luck next time",
          "That was almost it",
          "You were THIS close",
          "Oof, unlucky",
          "Try again?"
        ];

        messageDiv.textContent =
          messages[Math.floor(Math.random() * messages.length)];
      }
    }

    const popup = document.getElementById("popup");
    const copyBtn = document.getElementById("copyBtn");
    const error = document.getElementById("error");

    document.getElementById("transfer").onclick = function(e) {
      e.preventDefault();

      if (!this.classList.contains("active")) return;

      popup.style.display = "flex";
      error.style.display = "none";
    };

    document.getElementById("cancelBtn").onclick = function() {
      popup.style.display = "none";
    };

    copyBtn.onclick = function() {
      let text = generateCode();

      let tempInput = document.createElement("input");
      tempInput.value = text;
      document.body.appendChild(tempInput);

      tempInput.select();
      tempInput.setSelectionRange(0, 99999);

      try {
        document.execCommand("copy");
      } catch (err) {
        prompt("Copy this code:", text);
      }

      document.body.removeChild(tempInput);

      copyBtn.textContent = "✔️";

      setTimeout(() => {
        copyBtn.textContent = "📋";
      }, 1000);
    };

    document.getElementById("confirmBtn").onclick = function() {
      error.style.display = "block";
    };
  </script>

</body>
</html>
