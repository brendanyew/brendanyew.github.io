<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #111;
      color: white;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin: 8px 0;
      padding: 8px;
      border-radius: 6px;
    }

    .user { background: #1b5e20; }
    .bot { background: #0d47a1; }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #222;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #00bcd4;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "PUT_YOUR_API_KEY_HERE";

let messages = [
  { role: "system", content: "You are a helpful assistant." }
];

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  addMessage("You: " + text, "user");
  input.value = "";

  messages.push({ role: "user", content: text });

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: messages
      })
    });

    const data = await response.json();
    console.log("API RESPONSE:", data);

    // ❗ SHOW REAL ERRORS
    if (!response.ok) {
      addMessage("Error: " + (data.error?.message || JSON.stringify(data)), "bot");
      return;
    }

    if (!data.choices || !data.choices[0]) {
      addMessage("No reply received: " + JSON.stringify(data), "bot");
      return;
    }

    const reply = data.choices[0].message.content;

    addMessage("AI: " + reply, "bot");

    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    addMessage("Network error: " + err.message, "bot");
  }
}
</script>

</body>
</html>
