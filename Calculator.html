<!DOCTYPE html>
<html>
<head>
  <title>Advanced Scientific Calculator</title>

  <style>
    body {
      background: #0a1a33;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #102a54;
      padding: 15px;
      border-radius: 20px;
      width: 360px;
    }

    /* DISPLAY AREA */
    #display {
      width: 100%;
      min-height: 60px;
      font-size: 18px;
      padding: 10px;
      margin-bottom: 10px;
      background: #021024;
      color: white;
      border: 2px solid #2d6cdf;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    button {
      padding: 10px;
      font-size: 12px;
      background: #1e4fa3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .shift { background: #d97b00 !important; }
    .alpha { background: #2e8b57 !important; }

    /* FRACTION UI */
    .fraction, .mixed {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin: 2px;
      font-size: 14px;
    }

    .fraction input,
    .mixed input {
      width: 30px;
      text-align: center;
      background: #0a1a33;
      color: white;
      border: 1px solid #2d6cdf;
      border-radius: 4px;
    }

    .line {
      width: 100%;
      height: 2px;
      background: white;
      margin: 2px 0;
    }

    .wide { grid-column: span 2; }

  </style>
</head>

<body>

<div class="calculator">

  <div id="display"></div>

  <div class="buttons">

    <button class="shift" onclick="toggleShift()">SHIFT</button>
    <button class="alpha" onclick="toggleAlpha()">ALPHA</button>
    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="append('/')">÷</button>

    <!-- FUNCTIONS (SHIFT VISIBLE) -->
    <button onclick="appendFunc('sin','asin')">sin/asin</button>
    <button onclick="appendFunc('cos','acos')">cos/acos</button>
    <button onclick="appendFunc('tan','atan')">tan/atan</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('log(')">log</button>
    <button onclick="append('ln(')">ln</button>
    <button onclick="append('^')">^</button>

    <!-- FRACTION -->
    <button onclick="addFraction()">a/b</button>

    <button onclick="append('*')">×</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">−</button>
    <button onclick="append('sqrt(')">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>
    <button onclick="append('pi')">π</button>

    <!-- ALPHA KEYS -->
    <button onclick="appendAlpha('1','x')">1</button>
    <button onclick="appendAlpha('2','y')">2</button>
    <button onclick="appendAlpha('3','z')">3</button>

    <button onclick="append('.')">.</button>
    <button onclick="append('0')">0</button>

    <button class="wide" onclick="calculate()">=</button>

  </div>
</div>

<script>

let display = document.getElementById("display");

let shift = false;
let alpha = false;

/* =========================
   MODE TOGGLES
========================= */

function toggleShift() {
  shift = !shift;
}

function toggleAlpha() {
  alpha = !alpha;
}

/* =========================
   BASIC INPUT
========================= */

function append(val) {
  display.innerHTML += val;
}

function appendAlpha(num, letter) {
  display.innerHTML += alpha ? letter : num;
}

/* =========================
   SHIFT FUNCTION BUTTONS
========================= */

function appendFunc(normal, shifted) {
  display.innerHTML += shift ? shifted + "(" : normal + "(";
  shift = false;
}

/* =========================
   CASIO FRACTION (a/b)
========================= */

function addFraction() {

  if (shift) {
    // MIXED NUMBER TEMPLATE
    display.innerHTML += `
      <span class="mixed">
        <input placeholder="w">
        <div class="fraction">
          <input placeholder="a">
          <div class="line"></div>
          <input placeholder="b">
        </div>
      </span>
    `;
    shift = false;
  } else {
    // NORMAL FRACTION
    display.innerHTML += `
      <span class="fraction">
        <input placeholder="a">
        <div class="line"></div>
        <input placeholder="b">
      </span>
    `;
  }
}

/* =========================
   CONTROLS
========================= */

function clearAll() {
  display.innerHTML = "";
}

function del() {
  display.innerHTML = display.innerHTML.slice(0, -1);
}

/* =========================
   SIMPLE CALCULATE (basic fallback)
========================= */

function calculate() {
  try {
    let expr = display.innerText
      .replace(/pi/g, Math.PI);

    display.innerHTML = eval(expr);
  } catch {
    display.innerHTML = "Error";
  }
}

</script>

</body>
</html>
