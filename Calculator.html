<!DOCTYPE html>
<html>
<head>
  <title>Advanced Scientific Calculator</title>

  <style>
    body{
      margin:0;
      background:#0a1a33;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .calc{
      width:560px;
      background:#102a54;
      padding:15px;
      border-radius:16px;
    }

    #screen{
      min-height:140px;
      background:#021024;
      color:white;
      padding:10px;
      border-radius:10px;
      border:2px solid #2d6cdf;
      font-family:monospace;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      margin-top:10px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#1e4fa3;
      color:white;
      cursor:pointer;
    }

    .shift{background:#d97b00;}
    .alpha{background:#2e8b57;}

    /* FRACTION UI */
    .frac{
      display:inline-block;
      text-align:center;
    }

    .box{
      width:26px;
      height:18px;
      border:1px solid white;
      font-size:12px;
      line-height:18px;
      margin:auto;
    }

    .line{
      border-top:1px solid white;
      width:26px;
      margin:auto;
    }
  </style>
</head>

<body>
<div><a href="index.html"><img src="UPDATED Logo.png" alt="Brendan's Website"></a></div>
<div class="calc">

  <div id="screen"></div>

  <div class="grid">

    <button onclick="toggleShift()" class="shift">SHIFT</button>
    <button onclick="toggleAlpha()" class="alpha">ALPHA</button>

    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="input('/')">÷</button>

    <button onclick="func('sin','asin')">sin</button>
    <button onclick="func('cos','acos')">cos</button>
    <button onclick="func('tan','atan')">tan</button>

    <button onclick="input('(')">(</button>
    <button onclick="input(')')">)</button>

    <button onclick="input('log')">log</button>
    <button onclick="input('ln')">ln</button>
    <button onclick="input('^')">^</button>

    <button id="fracBtn" onclick="fraction()">a/b</button>

    <button onclick="input('*')">×</button>

    <button onclick="input(7)">7</button>
    <button onclick="input(8)">8</button>
    <button onclick="input(9)">9</button>

    <button onclick="input('-')">−</button>

    <button onclick="input(4)">4</button>
    <button onclick="input(5)">5</button>
    <button onclick="input(6)">6</button>

    <button onclick="input('+')">+</button>

    <button onclick="alphaKey(1,'x')">1</button>
    <button onclick="alphaKey(2,'y')">2</button>
    <button onclick="alphaKey(3,'z')">3</button>

    <button onclick="solve()">=</button>

  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  shift:false,
  alpha:false,
  tokens:[]
};

/* ================= SHIFT ================= */

function toggleShift(){
  state.shift = !state.shift;

  document.getElementById("fracBtn").textContent =
    state.shift ? "w a/b" : "a/b";
}

/* ================= ALPHA ================= */

function toggleAlpha(){
  state.alpha = !state.alpha;
}

/* ================= INPUT ================= */

function input(v){

  let t = state.tokens.at(-1);

  if(t && typeof t==="object"){

    if(t.type==="frac"){
      if(t.cursor==="n") t.n += v;
      else t.d += v;
      render();
      return;
    }

    if(t.type==="mix"){
      if(t.cursor==="w") t.w += v;
      else if(t.cursor==="n") t.n += v;
      else t.d += v;
      render();
      return;
    }
  }

  state.tokens.push(v);
  render();
}

/* ================= VARIABLES ================= */

function alphaKey(n,l){
  state.tokens.push(state.alpha ? {type:"var", value:l} : n);
  render();
}

/* ================= FUNCTIONS ================= */

function func(n,s){
  state.tokens.push(state.shift ? s : n);
  state.shift=false;
  document.getElementById("fracBtn").textContent="a/b";
}

/* ================= FRACTION ================= */

function fraction(){

  state.tokens.push(
    state.shift
      ? {type:"mix", w:"", n:"", d:"", cursor:"w"}
      : {type:"frac", n:"", d:"", cursor:"n"}
  );

  state.shift=false;
  document.getElementById("fracBtn").textContent="a/b";

  render();
}

/* ================= DELETE ================= */

function del(){
  state.tokens.pop();
  render();
}

function clearAll(){
  state.tokens=[];
  render();
}

/* ================= RENDER ================= */

function render(){

  let out="";

  for(let t of state.tokens){

    if(typeof t==="string" || typeof t==="number"){
      out += t + " ";
    }

    else if(t.type==="var"){
      out += t.value + " ";
    }

    else if(t.type==="frac"){
      out += `
        <span class="frac">
          <div class="box">${t.n||0}</div>
          <div class="line"></div>
          <div class="box">${t.d||0}</div>
        </span>
      `;
    }

    else if(t.type==="mix"){
      out += `
        <span style="display:inline-flex;align-items:center;gap:4px;">
          
          <div class="box">${t.w||0}</div>

          <span class="frac">
            <div class="box">${t.n||0}</div>
            <div class="line"></div>
            <div class="box">${t.d||0}</div>
          </span>

        </span>
      `;
    }
  }

  document.getElementById("screen").innerHTML = out;
}

/* ================= SOLVE ================= */

function solve(){

  try{
    let expr = buildExpression(state.tokens);
    let result = eval(expr);
    document.getElementById("screen").innerHTML = result;
  }catch{
    document.getElementById("screen").innerHTML = "Error";
  }
}

function buildExpression(tokens){

  let out="";

  for(let t of tokens){

    if(typeof t==="number") out+=t;

    else if(typeof t==="string"){
      if(t==="×") out+="*";
      else if(t==="−") out+="-";
      else out+=t;
    }

    else if(t.type==="var"){
      out+=0;
    }

    else if(t.type==="frac"){
      out += (Number(t.n||0)/Number(t.d||1));
    }

    else if(t.type==="mix"){
      out += (Number(t.w||0)+(Number(t.n||0)/Number(t.d||1)));
    }
  }

  return out;
}

render();

</script>

</body>
</html>
