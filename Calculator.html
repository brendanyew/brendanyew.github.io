<!DOCTYPE html>
<html>
<head>
  <title>Casio Style Calculator</title>
  <style>
    body {
      background: #0a1a33;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #102a54;
      padding: 15px;
      border-radius: 20px;
      width: 320px;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 22px;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
      background: #021024;
      color: white;
      border: 2px solid #2d6cdf;
      border-radius: 10px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
      position: relative;
    }

    #display::after {
      content: "|";
      position: absolute;
      right: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    button {
      padding: 10px;
      font-size: 13px;
      background: #1e4fa3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2d6cdf;
    }

    .small { font-size: 11px; padding: 8px; }
    .wide { grid-column: span 2; }
    .orange { background: #d97b00; }
    .green { background: #2e8b57; }
  </style>
</head>
<body>

<div class="calculator">
  <input id="display" placeholder="0" disabled>

  <div class="buttons">
    <!-- Top row -->
    <button class="small orange">SHIFT</button>
    <button class="small green">ALPHA</button>
    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="append('/')">÷</button>

    <!-- Scientific -->
    <button class="small" onclick="append('sin(')">sin</button>
    <button class="small" onclick="append('cos(')">cos</button>
    <button class="small" onclick="append('tan(')">tan</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button class="small" onclick="append('log(')">log</button>
    <button class="small" onclick="append('ln(')">ln</button>
    <button onclick="append('^')">^</button>
    <button onclick="append('%')">%</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">−</button>
    <button onclick="append('sqrt(')">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>
    <button onclick="append('pi')">π</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('.')">.</button>
    <button onclick="append('0')">0</button>

    <button class="wide" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function append(val) { display.value += val; }
function clearAll() { display.value = ""; }
function del() { display.value = display.value.slice(0, -1); }

function calculate() {
  try {
    display.value = evaluate(display.value);
  } catch {
    display.value = "Error";
  }
}

/* ===== PARSER ===== */

function evaluate(expr) {
  expr = expr.replace(/pi/g, Math.PI);
  let tokens = expr.match(/sin|cos|tan|sqrt|log|ln|\d+\.?\d*|[+\-*/^()%]/g);
  let rpn = toRPN(tokens);
  return evalRPN(rpn);
}

function toRPN(tokens) {
  let out = [], ops = [];
  let prec = {"+":1,"-":1,"*":2,"/":2,"^":3};

  tokens.forEach(t => {
    if (!isNaN(t)) out.push(t);
    else if (["sin","cos","tan","sqrt","log","ln"].includes(t)) ops.push(t);
    else if (t === "(") ops.push(t);
    else if (t === ")") {
      while (ops.length && ops.at(-1) !== "(") out.push(ops.pop());
      ops.pop();
    } else {
      while (ops.length && prec[ops.at(-1)] >= prec[t]) out.push(ops.pop());
      ops.push(t);
    }
  });

  return out.concat(ops.reverse());
}

function evalRPN(rpn) {
  let s = [];

  rpn.forEach(t => {
    if (!isNaN(t)) s.push(+t);
    else if ("+-*/^".includes(t)) {
      let b = s.pop(), a = s.pop();
      s.push(
        t==="+"?a+b:
        t==="-"?a-b:
        t==="*"?a*b:
        t==="/"?a/b:
        Math.pow(a,b)
      );
    } else {
      let a = s.pop();
      s.push(
        t==="sin"?Math.sin(a*Math.PI/180):
        t==="cos"?Math.cos(a*Math.PI/180):
        t==="tan"?Math.tan(a*Math.PI/180):
        t==="sqrt"?Math.sqrt(a):
        t==="log"?Math.log10(a):
        Math.log(a)
      );
    }
  });

  return s[0];
}
</script>

</body>
</html>
