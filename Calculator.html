<!DOCTYPE html>
<html>
<head>
  <title>CASIO fx Emulator</title>

  <style>
    body{
      margin:0;
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .container{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .logo img{
      max-width:200px;
    }

    .calc{
      width:560px;
      background:#102a54;
      padding:15px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    #screen{
      min-height:140px;
      background:#021024;
      color:white;
      padding:10px;
      border-radius:10px;
      border:2px solid #2d6cdf;
      font-family:monospace;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      margin-top:10px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#1e4fa3;
      color:white;
      cursor:pointer;
    }

    .shift{background:#d97b00;}
    .alpha{background:#2e8b57;}

    .frac{
      display:inline-block;
      text-align:center;
    }

    .box{
      width:26px;
      height:18px;
      border:1px solid white;
      font-size:12px;
      line-height:18px;
      margin:auto;
      cursor:pointer;
    }

    .line{
      border-top:1px solid white;
      width:26px;
      margin:auto;
    }

    .active{
      outline:2px solid yellow;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <a href="index.html">
      <img src="Logo.png" alt="Brendan's Website">
    </a>
  </div>

  <div class="calc">

    <div id="screen"></div>

    <div class="grid">

      <button onclick="toggleShift()" class="shift">SHIFT</button>
      <button onclick="toggleAlpha()" class="alpha">ALPHA</button>

      <button onclick="clearAll()">AC</button>
      <button onclick="del()">DEL</button>
      <button onclick="input('/')">÷</button>

      <button onclick="func('sin','asin')" id="b1">sin</button>
      <button onclick="func('cos','acos')" id="b2">cos</button>
      <button onclick="func('tan','atan')" id="b3">tan</button>

      <button onclick="input('(')" id="b4">(</button>
      <button onclick="input(')')" id="b5">)</button>

      <button onclick="input('log')" id="b6">log</button>
      <button onclick="input('ln')" id="b7">ln</button>
      <button onclick="input('^')" id="b8">^</button>

      <button id="fracBtn" onclick="fraction()">a/b</button>

      <button onclick="input('*')" id="b9">×</button>

      <button onclick="input(7)" id="b11">7</button>
      <button onclick="input(8)" id="b12">8</button>
      <button onclick="input(9)" id="b13">9</button>

      <button onclick="input('-')" id="b14">−</button>

      <button onclick="input(4)" id="b16">4</button>
      <button onclick="input(5)" id="b17">5</button>
      <button onclick="input(6)" id="b18">6</button>

      <button onclick="input('+')" id="b19">+</button>

      <button onclick="alphaKey(1,'x')" id="b21">1</button>
      <button onclick="alphaKey(2,'y')" id="b22">2</button>
      <button onclick="alphaKey(3,'z')" id="b23">3</button>

      <button onclick="solve()" id="b24">=</button>

    </div>
  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  shift:false,
  alpha:false,
  tokens:[]
};

/* ================= SHIFT / ALPHA ================= */

function toggleShift(){
  state.shift = !state.shift;
  updateKeys();
  document.getElementById("fracBtn").textContent =
    state.shift ? "w a/b" : "a/b";
}

function toggleAlpha(){
  state.alpha = !state.alpha;
  updateKeys();
  document.getElementById("fracBtn").textContent = "";
}

/* ================= KEY SYSTEM ================= */

function updateKeys(){

  const normal = {
    b1:"sin", b2:"cos", b3:"tan",
    b4:"(", b5:")",
    b6:"log", b7:"ln",
    b8:"^",
    b9:"×",
    b11:"7", b12:"8", b13:"9",
    b14:"−",
    b16:"4", b17:"5", b18:"6",
    b19:"+",
    b21:"1", b22:"2", b23:"3",
    b24:"="
  };

  const shift = {
    b1:"asin",
    b2:"acos",
    b3:"atan"
  };

  const alpha = {
    b21:"x",
    b22:"y",
    b23:"z"
  };

  for(let i=1;i<=24;i++){
    let btn=document.getElementById("b"+i);
    if(!btn) continue;

    if(state.shift){
      btn.textContent = shift["b"+i] || "";
    }
    else if(state.alpha){
      btn.textContent = alpha["b"+i] || "";
    }
    else{
      btn.textContent = normal["b"+i] || "";
    }
  }
}

/* ================= INPUT (FIXED FRACTIONS) ================= */

function input(v){

  let t = state.tokens.at(-1);

  if(t && typeof t==="object"){

    if(t.type==="frac"){
      if(t.cursor==="n") t.n += v;
      else t.d += v;
      render();
      return;
    }

    if(t.type==="mix"){
      if(t.cursor==="w") t.w += v;
      else if(t.cursor==="n") t.n += v;
      else t.d += v;
      render();
      return;
    }
  }

  state.tokens.push(v);
  render();
}

/* ================= CURSOR ================= */

function setCursor(i, part){
  state.tokens[i].cursor = part;
  render();
}

/* ================= FUNCTIONS ================= */

function alphaKey(n,l){
  state.tokens.push(state.alpha ? {type:"var", value:l} : n);
  render();
}

function func(n,s){
  state.tokens.push(state.shift ? s : n);
  state.shift=false;
  updateKeys();
}

function fraction(){
  state.tokens.push(
    state.shift
      ? {type:"mix", w:"", n:"", d:"", cursor:"w"}
      : {type:"frac", n:"", d:"", cursor:"n"}
  );

  state.shift=false;
  updateKeys();
  render();
}

function del(){ state.tokens.pop(); render(); }
function clearAll(){ state.tokens=[]; render(); }

/* ================= RENDER ================= */

function render(){

  let out="";

  for(let t of state.tokens){

    if(typeof t==="string" || typeof t==="number"){
      out += t + " ";
    }

    else if(t.type==="var"){
      out += t.value + " ";
    }

    else if(t.type==="frac"){
      let i = state.tokens.indexOf(t);

      out += `
        <span class="frac">
          <div class="box ${t.cursor==='n'?'active':''}"
               onclick="setCursor(${i},'n')">
            ${t.n||""}
          </div>

          <div class="line"></div>

          <div class="box ${t.cursor==='d'?'active':''}"
               onclick="setCursor(${i},'d')">
            ${t.d||""}
          </div>
        </span>
      `;
    }

    else if(t.type==="mix"){
      let i = state.tokens.indexOf(t);

      out += `
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <div class="box ${t.cursor==='w'?'active':''}"
               onclick="setCursor(${i},'w')">
            ${t.w||""}
          </div>

          <span class="frac">
            <div class="box ${t.cursor==='n'?'active':''}"
                 onclick="setCursor(${i},'n')">
              ${t.n||""}
            </div>

            <div class="line"></div>

            <div class="box ${t.cursor==='d'?'active':''}"
                 onclick="setCursor(${i},'d')">
              ${t.d||""}
            </div>
          </span>
        </span>
      `;
    }
  }

  document.getElementById("screen").innerHTML = out;
}

/* ================= SOLVE ================= */

function solve(){
  try{
    let expr = state.tokens.map(t=>{
      if(typeof t==="number") return t;
      if(typeof t==="string"){
        if(t==="×") return "*";
        if(t==="−") return "-";
        return t;
      }
      if(t.type==="var") return 0;
      if(t.type==="frac") return (t.n||0)/(t.d||1);
      if(t.type==="mix") return (t.w||0)+(t.n||0)/(t.d||1);
    }).join("");

    document.getElementById("screen").innerHTML = eval(expr);
  }catch{
    document.getElementById("screen").innerHTML="Error";
  }
}

render();
updateKeys();

</script>

</body>
</html>
