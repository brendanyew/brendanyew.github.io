<!DOCTYPE html>
<html>
<head>
  <title>Casio Style Scientific Calculator</title>

  <style>
    body {
      background: #0a1a33;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #102a54;
      padding: 15px;
      border-radius: 20px;
      width: 340px;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 22px;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
      background: #021024;
      color: white;
      border: 2px solid #2d6cdf;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    button {
      padding: 10px;
      font-size: 13px;
      background: #1e4fa3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.1s;
    }

    button:active {
      transform: scale(0.95);
    }

    .shift { background: #d97b00 !important; }
    .alpha { background: #2e8b57 !important; }
    .wide { grid-column: span 2; }
  </style>
</head>

<body>

<div class="calculator">

  <input id="display" placeholder="0" disabled>

  <div class="buttons">

    <button id="shiftBtn" class="shift" onclick="toggleShift()">SHIFT</button>
    <button id="alphaBtn" class="alpha" onclick="toggleAlpha()">ALPHA</button>
    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="append('/')">÷</button>

    <button data-n="sin(" data-s="asin(" onclick="func(this)">sin</button>
    <button data-n="cos(" data-s="acos(" onclick="func(this)">cos</button>
    <button data-n="tan(" data-s="atan(" onclick="func(this)">tan</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('log(')">log</button>
    <button onclick="append('ln(')">ln</button>
    <button onclick="append('^')">^</button>
    <button onclick="append('/')">a/b</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">−</button>
    <button onclick="append('sqrt(')">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>
    <button onclick="append('pi')">π</button>

    <!-- ALPHA KEYS -->
    <button data-n="1" data-a="x" onclick="alphaKey(this)">1</button>
    <button data-n="2" data-a="y" onclick="alphaKey(this)">2</button>
    <button data-n="3" data-a="z" onclick="alphaKey(this)">3</button>

    <button onclick="append('.')">.</button>
    <button onclick="append('0')">0</button>

    <button class="wide" onclick="calculate()">=</button>

  </div>
</div>

<script>

let display = document.getElementById("display");

let shift = false;
let alpha = false;

/* =========================
   MODE TOGGLES
========================= */

function toggleShift() {
  shift = !shift;
  document.getElementById("shiftBtn").style.opacity = shift ? "0.6" : "1";
}

function toggleAlpha() {
  alpha = !alpha;
  document.getElementById("alphaBtn").style.opacity = alpha ? "0.6" : "1";
  renderAlphaKeys();
}

/* =========================
   DYNAMIC ALPHA KEYS
========================= */

function renderAlphaKeys() {
  document.querySelectorAll("button[data-n]").forEach(btn => {
    btn.innerText = alpha ? btn.dataset.a : btn.dataset.n;
  });
}

/* =========================
   INPUT FUNCTIONS
========================= */

function append(val) {
  display.value += val;
}

function alphaKey(btn) {
  display.value += alpha ? btn.dataset.a : btn.dataset.n;
}

/* SHIFT FUNCTIONS */
function func(btn) {
  let val = shift ? btn.dataset.s : btn.dataset.n;
  display.value += val;
  shift = false;
  document.getElementById("shiftBtn").style.opacity = "1";
}

/* =========================
   CONTROLS
========================= */

function clearAll() {
  display.value = "";
}

function del() {
  display.value = display.value.slice(0, -1);
}

/* =========================
   CALCULATE
========================= */

function calculate() {
  try {
    display.value = evaluate(display.value);
  } catch (e) {
    display.value = "Error";
  }
}

/* =========================
   PARSER
========================= */

function evaluate(expr) {

  expr = expr.replace(/\bpi\b/g, Math.PI);

  let tokens = expr.match(/asin|acos|atan|sin|cos|tan|sqrt|log|ln|\d*\.?\d+|[a-z]+|[+\-*/^()]/g);

  let rpn = toRPN(tokens);
  return evalRPN(rpn);
}

function toRPN(tokens) {
  let out = [], ops = [];
  let prec = {"+":1,"-":1,"*":2,"/":2,"^":3};

  const isFunc = t => /^[a-z]+$/.test(t);

  tokens.forEach(t => {
    if (!isNaN(t)) out.push(t);

    else if (isFunc(t)) ops.push(t);

    else if (t === "(") ops.push(t);

    else if (t === ")") {
      while (ops.length && ops.at(-1) !== "(") {
        out.push(ops.pop());
      }
      ops.pop();

      if (ops.length && isFunc(ops.at(-1))) {
        out.push(ops.pop());
      }
    }

    else {
      while (
        ops.length &&
        prec[ops.at(-1)] >= prec[t] &&
        t !== "^"
      ) {
        out.push(ops.pop());
      }
      ops.push(t);
    }
  });

  while (ops.length) out.push(ops.pop());

  return out;
}

function evalRPN(rpn) {
  let s = [];

  rpn.forEach(t => {

    if (!isNaN(t)) s.push(+t);

    else if ("+-*/^".includes(t)) {
      let b = s.pop(), a = s.pop();

      s.push(
        t==="+" ? a+b :
        t==="-" ? a-b :
        t==="*" ? a*b :
        t==="/" ? a/b :
        Math.pow(a,b)
      );
    }

    else {
      let a = s.pop();

      s.push(
        t==="sin" ? Math.sin(a*Math.PI/180) :
        t==="cos" ? Math.cos(a*Math.PI/180) :
        t==="tan" ? Math.tan(a*Math.PI/180) :
        t==="asin" ? Math.asin(a)*180/Math.PI :
        t==="acos" ? Math.acos(a)*180/Math.PI :
        t==="atan" ? Math.atan(a)*180/Math.PI :
        t==="sqrt" ? Math.sqrt(a) :
        t==="log" ? Math.log10(a) :
        t==="ln" ? Math.log(a) :
        0
      );
    }
  });

  return s[0];
}

</script>

</body>
</html>
