<!DOCTYPE html>
<html>
<head>
  <title>CASIO fx-991EX FINAL ENGINE</title>

  <style>
    body{
      margin:0;
      background:#0a1a33;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .calc{
      width:560px;
      background:#102a54;
      padding:15px;
      border-radius:16px;
    }

    #screen{
      min-height:140px;
      background:#021024;
      color:white;
      padding:10px;
      border-radius:10px;
      border:2px solid #2d6cdf;
      font-size:14px;
      white-space:pre;
      font-family:monospace;
      line-height:1.2;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      margin-top:10px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#1e4fa3;
      color:white;
      font-size:11px;
      cursor:pointer;
      min-height:36px;
    }

    .shift{background:#d97b00;}
    .alpha{background:#2e8b57;}

    .modebar{
      display:flex;
      gap:5px;
      margin-bottom:8px;
    }

    .modebar button{
      flex:1;
      background:#223a70;
    }

    .activeMode{background:#3a5fbf !important;}
  </style>
</head>

<body>

<div class="calc">

  <div class="modebar">
    <button onclick="setMode('COMP')" id="COMPbtn">COMP</button>
    <button onclick="setMode('EQ')" id="EQbtn">EQ</button>
    <button onclick="setMode('STAT')" id="STATbtn">STAT</button>
    <button onclick="setMode('MAT')" id="MATbtn">MAT</button>
  </div>

  <div id="screen"></div>

  <div class="grid">

    <button onclick="toggleShift()" class="shift">SHIFT</button>
    <button onclick="toggleAlpha()" class="alpha">ALPHA</button>

    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="input('/')">÷</button>

    <button onclick="func('sin','asin')">sin</button>
    <button onclick="func('cos','acos')">cos</button>
    <button onclick="func('tan','atan')">tan</button>

    <button onclick="input('(')">(</button>
    <button onclick="input(')')">)</button>

    <button onclick="input('log')">log</button>
    <button onclick="input('ln')">ln</button>
    <button onclick="input('^')">^</button>

    <button onclick="input('*')">×</button>

    <button onclick="input(7)">7</button>
    <button onclick="input(8)">8</button>
    <button onclick="input(9)">9</button>

    <button onclick="input('-')">−</button>

    <button onclick="input(4)">4</button>
    <button onclick="input(5)">5</button>
    <button onclick="input(6)">6</button>

    <button onclick="input('+')">+</button>

    <button onclick="alphaKey(1,'x')">1</button>
    <button onclick="alphaKey(2,'y')">2</button>
    <button onclick="alphaKey(3,'z')">3</button>

    <button onclick="solve()">=</button>

  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  mode:"COMP",
  shift:false,
  alpha:false,
  tokens:[]
};

/* ================= MODE ================= */

function setMode(m){
  state.mode=m;

  ["COMP","EQ","STAT","MAT"].forEach(id=>{
    document.getElementById(id+"btn").classList.remove("activeMode");
  });

  document.getElementById(m+"btn").classList.add("activeMode");

  render();
}

/* ================= INPUT ================= */

function input(v){
  state.tokens.push(v);
  render();
}

/* ================= ALPHA ================= */

function alphaKey(n,l){
  state.tokens.push(state.alpha ? {type:"var", value:l} : n);
  render();
}

/* ================= SHIFT / ALPHA ================= */

function toggleShift(){ state.shift=!state.shift; }
function toggleAlpha(){ state.alpha=!state.alpha; }

/* ================= FUNCTIONS ================= */

function func(n,s){
  state.tokens.push(state.shift ? s : n);
  state.shift=false;
}

/* ================= DELETE ================= */

function del(){
  state.tokens.pop();
  render();
}

function clearAll(){
  state.tokens=[];
  render();
}

/* ================= RENDER ================= */

function render(){
  document.getElementById("screen").innerHTML =
    state.mode + " : " + state.tokens.map(t =>
      typeof t==="object" ? t.value : t
    ).join(" ");
}

/* ================= FX-991EX PARSER ================= */

function solve(){

  try{
    const expr = buildExpression(state.tokens);
    const result = evaluateExpression(expr);

    document.getElementById("screen").innerHTML =
      state.mode + " : " + result;

  } catch(e){
    document.getElementById("screen").innerHTML =
      state.mode + " : Error";
  }
}

function buildExpression(tokens){

  let out="";

  for(let t of tokens){

    if(typeof t==="number"){
      out += t;
    }

    else if(typeof t==="string"){

      if(t==="×") out+="*";
      else if(t==="−") out+="-";
      else out+=t;
    }

    else if(t?.type==="var"){
      out += 0;
    }
  }

  return out;
}

function evaluateExpression(expr){

  const tokens = expr.match(/(\d+\.?\d*|[+\-*/^()])/g);
  const output=[];
  const ops=[];
  const prec={"+":1,"-":1,"*":2,"/":2,"^":3};

  for(let t of tokens){

    if(!isNaN(t)) output.push(Number(t));

    else if(t in prec){
      while(ops.length && prec[ops.at(-1)]>=prec[t]){
        output.push(ops.pop());
      }
      ops.push(t);
    }

    else if(t==="(") ops.push(t);

    else if(t===")"){
      while(ops.at(-1)!=="("){
        output.push(ops.pop());
      }
      ops.pop();
    }
  }

  while(ops.length) output.push(ops.pop());

  let stack=[];

  for(let t of output){

    if(typeof t==="number") stack.push(t);

    else{
      let b=stack.pop(), a=stack.pop();

      if(t==="+") stack.push(a+b);
      if(t==="-") stack.push(a-b);
      if(t==="*") stack.push(a*b);
      if(t==="/") stack.push(a/b);
      if(t==="^") stack.push(Math.pow(a,b));
    }
  }

  return stack[0];
}

/* INIT */
setMode("COMP");
render();

</script>

</body>
</html>
