<!DOCTYPE html>
<html>
<head>
  <title>Advanced Scientific Calculator</title>

  <style>
    body{
      margin:0;
      background:#0a1a33;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .calc{
      width:560px;
      background:#102a54;
      padding:15px;
      border-radius:16px;
    }

    #screen{
      min-height:120px;
      background:#021024;
      color:white;
      padding:10px;
      border-radius:10px;
      border:2px solid #2d6cdf;
      font-family:monospace;
      white-space:pre;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      margin-top:10px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#1e4fa3;
      color:white;
      cursor:pointer;
    }

    .shift{background:#d97b00;}
    .alpha{background:#2e8b57;}
  </style>
</head>

<body>

<div class="calc">

  <div id="screen"></div>

  <div class="grid">

    <button onclick="toggleShift()" class="shift">SHIFT</button>
    <button onclick="toggleAlpha()" class="alpha">ALPHA</button>

    <button onclick="clearAll()">AC</button>
    <button onclick="del()">DEL</button>
    <button onclick="input('/')">÷</button>

    <button id="b1" onclick="func('sin','asin')">sin</button>
    <button id="b2" onclick="func('cos','acos')">cos</button>
    <button id="b3" onclick="func('tan','atan')">tan</button>

    <button id="b4" onclick="input('(')">(</button>
    <button id="b5" onclick="input(')')">)</button>

    <button id="b6" onclick="input('log')">log</button>
    <button id="b7" onclick="input('ln')">ln</button>
    <button id="b8" onclick="input('^')">^</button>

    <button id="b9" onclick="input('*')">×</button>

    <button id="b11" onclick="input(7)">7</button>
    <button id="b12" onclick="input(8)">8</button>
    <button id="b13" onclick="input(9)">9</button>

    <button id="b14" onclick="input('-')">−</button>

    <button id="b16" onclick="input(4)">4</button>
    <button id="b17" onclick="input(5)">5</button>
    <button id="b18" onclick="input(6)">6</button>

    <button id="b19" onclick="input('+')">+</button>

    <button id="b21" onclick="alphaKey(1,'x')">1</button>
    <button id="b22" onclick="alphaKey(2,'y')">2</button>
    <button id="b23" onclick="alphaKey(3,'z')">3</button>

    <button id="b24" onclick="solve()">=</button>

  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  shift:false,
  alpha:false,
  tokens:[]
};

/* ================= INPUT ================= */

function input(v){
  if(!isNaN(v)) state.tokens.push(Number(v));
  else state.tokens.push(v);
  render();
}

function alphaKey(n,l){
  state.tokens.push(state.alpha ? {type:"var", value:l} : n);
  render();
}

/* ================= SHIFT / ALPHA ================= */

function toggleShift(){
  state.shift = !state.shift;
  state.alpha = false;
  updateKeys();
}

function toggleAlpha(){
  state.alpha = !state.alpha;
  state.shift = false;
  updateKeys();
}

/* ================= FUNCTIONS ================= */

function func(n,s){
  state.tokens.push(state.shift ? s : n);
  state.shift = false;
  updateKeys();
}

/* ================= DELETE ================= */

function del(){
  state.tokens.pop();
  render();
}

function clearAll(){
  state.tokens = [];
  render();
}

/* ================= KEY LABEL SYSTEM ================= */

function updateKeys(){

  const normal = {
    b1:"sin", b2:"cos", b3:"tan",
    b4:"(", b5:")",
    b6:"log", b7:"ln",
    b8:"^",
    b9:"×",
    b11:"7", b12:"8", b13:"9",
    b14:"−",
    b16:"4", b17:"5", b18:"6",
    b19:"+",
    b21:"1", b22:"2", b23:"3",
    b24:"="
  };

  const shift = {
    b1:"asin",
    b2:"acos",
    b3:"atan"
  };

  const alpha = {
    b21:"x",
    b22:"y",
    b23:"z"
  };

  let active = {...normal};

  if(state.shift){
    for(let k in active){
      active[k] = shift[k] || "";
    }
  }

  if(state.alpha){
    for(let k in active){
      active[k] = alpha[k] || "";
    }
  }

  for(let i=1;i<=24;i++){
    let btn = document.getElementById("b"+i);
    if(btn) btn.textContent = active["b"+i] || "";
  }
}

/* ================= RENDER ================= */

function render(){
  document.getElementById("screen").textContent =
    state.tokens.map(t =>
      typeof t==="object" ? t.value : t
    ).join(" ");
}

/* ================= PARSER ================= */

function solve(){

  try{
    const expr = buildExpression(state.tokens);
    const result = evaluateExpression(expr);

    document.getElementById("screen").textContent = result;

  } catch{
    document.getElementById("screen").textContent = "Error";
  }
}

function buildExpression(tokens){

  let out = "";

  for(let t of tokens){

    if(typeof t === "number"){
      out += t;
    }

    else if(typeof t === "string"){
      if(t==="×") out+="*";
      else if(t==="−") out+="-";
      else out+=t;
    }

    else if(t.type==="var"){
      out += 0;
    }
  }

  return out;
}

function evaluateExpression(expr){

  const tokens = expr.match(/(\d+\.?\d*|[+\-*/^()])/g);
  const output=[], ops=[];
  const prec={"+":1,"-":1,"*":2,"/":2,"^":3};

  for(let t of tokens){

    if(!isNaN(t)) output.push(Number(t));

    else if(t in prec){
      while(ops.length && prec[ops.at(-1)]>=prec[t]){
        output.push(ops.pop());
      }
      ops.push(t);
    }

    else if(t==="(") ops.push(t);

    else if(t===")"){
      while(ops.at(-1)!=="("){
        output.push(ops.pop());
      }
      ops.pop();
    }
  }

  while(ops.length) output.push(ops.pop());

  let stack=[];

  for(let t of output){

    if(typeof t==="number") stack.push(t);

    else{
      let b=stack.pop(), a=stack.pop();

      if(t==="+") stack.push(a+b);
      if(t==="-") stack.push(a-b);
      if(t==="*") stack.push(a*b);
      if(t==="/") stack.push(a/b);
      if(t==="^") stack.push(Math.pow(a,b));
    }
  }

  return stack[0];
}

/* INIT */
updateKeys();
render();

</script>

</body>
</html>
