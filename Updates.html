<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updates and What's Going On</title>

<style>

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a, #111827);
    color: #e5e7eb;
}

h1 {
    text-align: center;
    margin-top: 120px;
}

p {
    text-align: center;
    color: #9ca3af;
}

/* NAV */
.navigation {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    padding: 12px;
    border-radius: 12px;
}

button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* SEARCH */
#dateSearch {
    display: none;
    padding: 8px;
    margin-top: 10px;
    width: 220px;
    border-radius: 8px;
    border: none;
}

/* MENU */
#dateMenu {
    display: none;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px;
    max-height: 400px;
    overflow-y: auto;
    border-radius: 10px;
}

/* UPDATES */
.update {
    display: none;
    max-width: 700px;
    margin: 40px auto;
    padding: 25px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
}

.date {
    color: #93c5fd;
    font-size: 14px;
}

/* NO UPDATE */
#noUpdateBox {
    display: none;
    max-width: 700px;
    margin: 40px auto;
    padding: 25px;
    text-align: center;
    color: #fca5a5;
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
}

</style>
</head>

<body>

<div class="navigation">

<button onclick="goToday()">Today</button>
<button onclick="toggleDates()">Go To...</button>

<br>

<input id="dateSearch" placeholder="Search..." onkeyup="searchDates()">

<br>

<button id="coverButton" onclick="showCover()" style="display:none;">
Cover Page
</button>

<div id="dateMenu"></div>

</div>

<h1>Updates and What's Going On</h1>
<p>Your personal update log</p>

<!-- UPDATES -->
<div class="update" id="2026-06-14">
    <div class="date">June 14, 2026</div>
    <h2>Updates Page Created</h2>
    <p></p>
</div>

<div class="update" id="2026-06-15">
    <div class="date">June 15, 2026</div>
    <h2></h2>
    <p></p>
</div>

<div class="update" id="2026-06-01">
    <div class="date">June 1, 2026</div>
    <h2>Thumbnail.png Hall of fame Update</h2>
    <p></p>
</div>

<div id="noUpdateBox"></div>

<script>

let startDate = new Date("2026-06-14");
startDate.setHours(0,0,0,0);

// ---------------- COVER ----------------
function showCover(){
document.querySelectorAll(".update").forEach(u => u.style.display="none");
document.getElementById("noUpdateBox").style.display="none";
document.getElementById("dateMenu").style.display="none";
document.getElementById("dateSearch").style.display="none";
document.getElementById("coverButton").style.display="none";
}

// ---------------- SHOW UPDATE ----------------
function showUpdate(id){

document.getElementById("noUpdateBox").style.display="none";

document.querySelectorAll(".update").forEach(u => u.style.display="none");

let el = document.getElementById(id);

if(el){
    el.style.display="block";
    el.scrollIntoView({behavior:"smooth"});
}

document.getElementById("coverButton").style.display="block";
}

// ---------------- NO UPDATE ----------------
function showNoUpdate(dateText){

document.querySelectorAll(".update").forEach(u => u.style.display="none");

let box = document.getElementById("noUpdateBox");
box.innerHTML = "There is no update here — " + dateText;
box.style.display="block";

document.getElementById("coverButton").style.display="block";
}

// ---------------- TODAY ----------------
function goToday(){

let today = new Date();
today.setHours(0,0,0,0);

let id =
today.getFullYear() + "-" +
String(today.getMonth()+1).padStart(2,"0") + "-" +
String(today.getDate()).padStart(2,"0");

showUpdate(id);
}

// ---------------- GO TO ----------------
function toggleDates(){

let menu = document.getElementById("dateMenu");
let search = document.getElementById("dateSearch");

if(menu.style.display==="block"){
    menu.style.display="none";
    search.style.display="none";
    document.getElementById("coverButton").style.display="none";
    return;
}

menu.innerHTML="";

let base = new Date();
base.setHours(0,0,0,0);

let items = [];

// TODAY → +14 DAYS
for(let i=0;i<=14;i++){

let date = new Date(base);
date.setDate(base.getDate()+i);

let id =
date.getFullYear() + "-" +
String(date.getMonth()+1).padStart(2,"0") + "-" +
String(date.getDate()).padStart(2,"0");

items.push({id,date});

}

// REAL UPDATES
document.querySelectorAll(".update").forEach(u=>{
items.push({id:u.id,date:new Date(u.id)});
});

// SORT
items.sort((a,b)=>a.date-b.date);

// BUILD MENU
items.forEach(item=>{

let btn=document.createElement("button");

let text=item.date.toLocaleDateString("en-US",{
month:"long",day:"numeric",year:"numeric"
});

btn.innerHTML=text;

btn.onclick=function(){

let exists=document.getElementById(item.id);

if(exists){
    showUpdate(item.id);
} else {
    showNoUpdate(text);
}

menu.style.display="none";
search.style.display="none";
document.getElementById("coverButton").style.display="none";

};

menu.appendChild(btn);

});

menu.style.display="block";
search.style.display="block";
document.getElementById("coverButton").style.display="block";

}

// ---------------- SEARCH ----------------
function searchDates(){

let text=document.getElementById("dateSearch").value.toLowerCase();

document.querySelectorAll("#dateMenu button").forEach(btn=>{
btn.style.display=btn.innerHTML.toLowerCase().includes(text)
?"block":"none";
});

}

</script>

</body>
</html>
