<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Checker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    img {
      width: 160px;
      margin-bottom: 20px;
    }

    .input-box {
      display: flex;
      border: 2px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: none;
      outline: none;
    }

    button {
      background: #f0f0f0;
      border: none;
      padding: 0 16px;
      cursor: pointer;
      font-size: 18px;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .prime {
      color: red;
    }

    .composite {
      color: green;
    }

    .neither {
      color: gray;
    }

    .factors {
      margin-top: 10px;
      color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <a href="index.html">
        <img src="Logo.png" alt="Brendan's Website">
      </a>
    </div>

    <div class="input-box">
      <input id="numInput" type="number" placeholder="Enter a number" />
      <button onclick="checkNumber()">→</button>
    </div>

    <div id="result" class="result"></div>
    <div id="factors" class="factors"></div>
  </div>

  <script>
    function getFactors(n) {
      const res = [];
      for (let i = 1; i <= n; i++) {
        if (n % i === 0) res.push(i);
      }
      return res;
    }

    function checkNumber() {
      const value = document.getElementById("numInput").value;
      const n = parseInt(value);
      const resultDiv = document.getElementById("result");
      const factorsDiv = document.getElementById("factors");

      resultDiv.className = "result";
      factorsDiv.innerHTML = "";
      resultDiv.innerHTML = "";

      if (!n || n < 1) return;

      const factors = getFactors(n);

      if (n === 1) {
        resultDiv.textContent = "Neither prime nor composite";
        resultDiv.classList.add("neither");
        factorsDiv.textContent = "Factors: 1";
        return;
      }

      factorsDiv.textContent = "Factors: " + factors.join(", ");

      if (factors.length === 2) {
        resultDiv.textContent = "Prime";
        resultDiv.classList.add("prime");
      } else {
        resultDiv.textContent = "Composite";
        resultDiv.classList.add("composite");
      }
    }
  </script>
</body>
</html>
