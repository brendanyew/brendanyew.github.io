<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      overflow: hidden;
    }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 320px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display:none; }

    #app {
      display: none;
      height: 100vh;
      display: flex;
    }

    #sidebar {
      width: 260px;
      background: #181818;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #topBar {
      padding: 12px;
      background: #181818;
      border-bottom: 1px solid #333;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #111;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #181818;
      align-items: center;
    }

    #msg {
      flex: 1;
      margin-right: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    #sendBtn {
      width: 100px;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      margin-left: 10px;
    }

    #undo {
      font-size: 12px;
      color: #3b82f6;
      cursor: pointer;
      margin-left: 10px;
      display: none;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="box">

    <h2>Create Account</h2>

    <div id="stepName">
      <input id="first" placeholder="First name">
      <input id="last" placeholder="Last name">
      <button onclick="goPhone()">Continue</button>
    </div>

    <div id="stepPhone" class="hidden">
      <input id="phone" placeholder="+61 number">
      <button onclick="sendCode()">Send Code</button>
      <div id="error2"></div>
    </div>

    <div id="stepCode" class="hidden">
      <input id="code" placeholder="Enter code">
      <button onclick="verify()">Verify</button>
    </div>

    <div id="recaptcha"></div>

  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="sidebar"></div>

  <div id="chat">

    <div id="topBar">
      <div id="chatName">Chat</div>
      <div id="statusText">offline</div>
    </div>

    <div id="messages"></div>

    <div id="inputBox">

      <input id="msg" placeholder="Type message...">

      <button id="sendBtn" onclick="sendMessage()">Send</button>

      <div id="status"></div>

      <div id="undo" onclick="undoSend()">Undo</div>

    </div>

  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;
let confirmation;
let lastMessage = null;
let undoTimer;

/* ---------------- LOGIN FLOW ---------------- */
function goPhone() {
  document.getElementById("stepName").classList.add("hidden");
  document.getElementById("stepPhone").classList.remove("hidden");
}

function sendCode() {
  let phone = document.getElementById("phone").value;
  if (!phone.startsWith("+")) phone = "+61" + phone;

  window.recaptchaVerifier =
    new firebase.auth.RecaptchaVerifier("recaptcha", { size: "invisible" });

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(res => {
      confirmation = res;
      document.getElementById("error2").innerText = "Code sent";
      document.getElementById("stepPhone").classList.add("hidden");
      document.getElementById("stepCode").classList.remove("hidden");
    })
    .catch(err => {
      document.getElementById("error2").innerText =
        "Failed to send code: " + err.message;
    });
}

function verify() {
  const code = document.getElementById("code").value;

  confirmation.confirm(code)
    .then(res => {
      user = res.user;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "flex";
    });
}

/* ---------------- CHAT SEND (GMAIL STYLE) ---------------- */
function sendMessage() {

  const text = document.getElementById("msg").value;
  if (!text) return;

  setSending();

  setTimeout(() => {

    lastMessage = {
      id: Date.now(),
      text
    };

    db.collection("messages").add({
      text,
      sender: user.uid,
      time: Date.now()
    });

    setSent();

  }, 800);
}

/* ---------------- STATES ---------------- */
function setSending() {
  const btn = document.getElementById("sendBtn");

  btn.innerText = "Sending...";
  btn.disabled = true;

  document.getElementById("status").innerText = "";
  document.getElementById("undo").style.display = "none";
}

function setSent() {
  const btn = document.getElementById("sendBtn");

  btn.innerText = "Send";
  btn.disabled = false;

  document.getElementById("status").innerText = "Message sent ✔";

  document.getElementById("msg").value = "";

  document.getElementById("undo").style.display = "inline";

  undoTimer = setTimeout(() => {
    document.getElementById("undo").style.display = "none";
  }, 5000);
}

/* ---------------- UNDO ---------------- */
function undoSend() {

  lastMessage = null;

  document.getElementById("status").innerText = "Send undone";

  document.getElementById("undo").style.display = "none";
}

</script>

</body>
</html>
