<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 300px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 0;
      border-radius: 5px;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #22c55e;
      color: black;
      cursor: pointer;
    }

    #app {
      display: none;
      height: 100vh;
      display: flex;
    }

    #sidebar {
      width: 250px;
      background: #181818;
      padding: 10px;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    #inputBox {
      display: flex;
    }

    #inputBox input {
      flex: 1;
    }

    #error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="box">
    <h3>Create Account</h3>

    <div id="stepName">
      <input id="first" placeholder="First name">
      <input id="last" placeholder="Last name">
      <button onclick="goPhone()">Continue</button>
    </div>

    <div id="stepPhone" style="display:none;">
      <input id="phone" placeholder="+614...">
      <button onclick="sendCode()">Send Code</button>
    </div>

    <div id="stepCode" style="display:none;">
      <input id="code" placeholder="Enter code">
      <button onclick="verify()">Verify</button>
    </div>

    <div id="recaptcha"></div>

    <p id="error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msg">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
  // ================= FIREBASE =================
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  let confirmation;
  let user;
  let selectedChat = null;

  // ================= STEP 1 =================
  function goPhone() {
    document.getElementById("stepName").style.display = "none";
    document.getElementById("stepPhone").style.display = "block";
  }

  // ================= SEND CODE =================
  function sendCode() {
    const phone = document.getElementById("phone").value;

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
      "recaptcha",
      { size: "invisible" }
    );

    auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
      .then(result => {
        confirmation = result;

        document.getElementById("error").innerText = "";

        document.getElementById("stepPhone").style.display = "none";
        document.getElementById("stepCode").style.display = "block";
      })
      .catch(() => {
        document.getElementById("error").innerText = "Failed to send code";
      });
  }

  // ================= VERIFY =================
  function verify() {
    const code = document.getElementById("code").value;

    confirmation.confirm(code)
      .then(res => {
        user = res.user;

        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";

        loadChats();
      })
      .catch(() => {
        document.getElementById("error").innerText = "Invalid code";
      });
  }

  // ================= LOAD CHATS =================
  function loadChats() {
    db.collection("chats").onSnapshot(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        html += `
          <div 
            onclick="openChat('${doc.id}')"
            style="padding:10px; cursor:pointer; border-bottom:1px solid #333;"
          >
            ${doc.data().name}
          </div>
        `;
      });

      document.getElementById("chatList").innerHTML = html;
    });
  }

  // ================= OPEN CHAT =================
  function openChat(id) {
    selectedChat = id;

    db.collection("messages")
      .where("chatId", "==", id)
      .onSnapshot(snapshot => {
        let html = "";

        snapshot.forEach(doc => {
          const msg = doc.data();

          html += `
            <div style="padding:5px;">
              ${msg.text}
            </div>
          `;
        });

        document.getElementById("messages").innerHTML = html;
      });
  }

  // ================= SEND MESSAGE =================
  function sendMessage() {
    const text = document.getElementById("msg").value;

    if (!text || !selectedChat) return;

    db.collection("messages").add({
      chatId: selectedChat,
      text: text,
      sender: user.uid,
      time: Date.now()
    });

    document.getElementById("msg").value = "";
  }

  // ================= NEW CHAT =================
  function newChat() {
    const name = prompt("Chat name:");

    if (!name) return;

    db.collection("chats").add({
      name: name,
      members: [user.uid]
    });
  }
</script>

</body>
</html>
